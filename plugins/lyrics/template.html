<div class="lyrics-widget">
  <div class="lyrics-track-info">
    <span class="lyrics-title">{{title}}</span>
    <span class="lyrics-artist">{{artist}}</span>
  </div>
  <div class="lyrics-preview">{{previewLines}}</div>
  <details class="lyrics-details">
    <summary class="lyrics-show-all">Full lyrics</summary>
    <div class="lyrics-full">{{fullLyrics}}</div>
  </details>
  <p class="lyrics-source">
    Source:
    <a
      href="https://lrclib.net"
      class="lyrics-source-link"
      target="_blank"
      rel="noopener noreferrer"
      >LrcLib</a
    >
  </p>
</div>
