<div class="dict-card">
  <div class="dict-header">
    <span class="dict-word">{{word}}</span>
    <span class="dict-phonetic">{{phonetic}}</span>
  </div>
  <div class="dict-entries">{{entries_html}}</div>
  <div class="dict-footer">
    <a
      class="dict-source-link"
      href="{{source_url}}"
      target="_blank"
      rel="noopener noreferrer"
      >{{source_name}}</a
    >
  </div>
</div>
